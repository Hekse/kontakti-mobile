<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kontakti Mobiili</title>
  <style>
    :root {
      --bg: #0a0d12;
      --bg-2: #0f141c;
      --panel: rgba(20, 27, 39, 0.92);
      --panel-2: rgba(17, 23, 33, 0.96);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ecf2ff;
      --muted: #98a4bb;
      --blue-soft: rgba(94, 160, 255, 0.16);
      --purple-soft: rgba(166, 108, 255, 0.18);
      --red-soft: rgba(255, 107, 127, 0.16);
      --green-soft: rgba(82, 212, 154, 0.16);
      --amber-soft: rgba(246, 190, 79, 0.16);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
      --radius-xl: 24px;
      --radius-lg: 20px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(94,160,255,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(166,108,255,0.12), transparent 28%),
        linear-gradient(180deg, #0a0d12 0%, #0d1118 100%);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 18px 14px 28px;
    }

    body.light-theme {
      background:
        radial-gradient(circle at top left, rgba(94,160,255,0.10), transparent 32%),
        radial-gradient(circle at top right, rgba(166,108,255,0.08), transparent 30%),
        linear-gradient(180deg, #eef3fb 0%, #e7edf7 100%);
      color: #162033;
    }

    .phone {
      width: 100%;
      max-width: 430px;
      min-height: calc(100vh - 36px);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 34px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(18px);
    }

    body.light-theme .phone {
      background: linear-gradient(180deg, rgba(255,255,255,0.90), rgba(246,249,253,0.94));
      border-color: rgba(17,24,39,0.08);
      box-shadow: 0 20px 50px rgba(31,41,55,0.16);
    }

    .screen,
    .subscreen {
      padding: 18px 16px 22px;
    }

    .subscreen {
      position: absolute;
      inset: 0;
      z-index: 8;
      background:
        radial-gradient(circle at top left, rgba(94,160,255,0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(166,108,255,0.12), transparent 28%),
        linear-gradient(180deg, #0a0d12 0%, #0d1118 100%);
      overflow-y: auto;
    }

    body.light-theme .screen,
    body.light-theme .subscreen {
      background:
        radial-gradient(circle at top left, rgba(94,160,255,0.08), transparent 30%),
        radial-gradient(circle at top right, rgba(166,108,255,0.06), transparent 28%),
        linear-gradient(180deg, #f6f9fd 0%, #edf3fb 100%);
      color: #162033;
    }

    .hidden { display: none !important; }

    .splash {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background:
        radial-gradient(circle at center, rgba(30, 100, 255, 0.10), transparent 28%),
        linear-gradient(180deg, #03122c 0%, #020b1c 100%);
      animation: splashFade 3.2s ease forwards;
      pointer-events: none;
    }

    .splash-shell {
      position: relative;
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      opacity: 0;
      transform: translateY(6px) scale(0.985);
      animation: splashRise 1.2s ease 0.15s forwards;
    }

    .splash-brand {
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 2;
    }

    .splash-opero-logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 44px;
      font-weight: 700;
      color: #eaf3ff;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.28), rgba(255,255,255,0.04) 42%), linear-gradient(180deg, #2990ff 0%, #1f66ff 100%);
      box-shadow: 0 0 22px rgba(41, 144, 255, 0.35);
    }

    .splash-opero-word {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #ffffff;
    }

    .splash-line {
      width: 180px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, #39a0ff, transparent);
      box-shadow: 0 0 14px rgba(57,160,255,0.45);
      z-index: 2;
    }

    .splash-product {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: #ffffff;
      z-index: 2;
    }

    .splash-ring {
      position: absolute;
      top: 88px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 1px solid rgba(120, 170, 255, 0.10);
      box-shadow:
        0 0 40px rgba(40, 120, 255, 0.08) inset,
        0 0 50px rgba(40, 120, 255, 0.06);
    }

    .splash-line-bottom {
      margin-top: 120px;
    }

    .splash-loading {
      font-size: 15px;
      color: rgba(236,242,255,0.90);
      z-index: 2;
    }

    .topbar,
    .sub-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 12px;
    }

    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.18), transparent 35%),
        linear-gradient(135deg, rgba(94,160,255,0.24), rgba(166,108,255,0.22));
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: 0 0 24px rgba(94,160,255,0.18);
      flex: 0 0 auto;
    }

    .logo-mark { font-size: 18px; font-weight: 800; letter-spacing: 0.04em; }
    .title-wrap, .sub-title-wrap { min-width: 0; flex: 1; }
    .eyebrow { color: var(--muted); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 2px; }
    .title, .sub-title { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sub-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .top-actions { display: flex; gap: 10px; }

    .icon-btn,
    .back-btn,
    .sub-icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: inherit;
      display: grid;
      place-items: center;
      font-size: 17px;
      cursor: pointer;
    }

    .section-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; margin: 20px 2px 10px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

    .tile {
      position: relative;
      min-height: 124px;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 45%);
      opacity: 0.7;
    }

    .tile[data-open], .tile[data-summary] { cursor: pointer; }
    .tile:hover { border-color: rgba(255,255,255,0.16); box-shadow: 0 14px 34px rgba(0,0,0,0.28); }
    .tile[data-open]:hover, .tile[data-summary]:hover { transform: translateY(-1px); }
    .tile:active { transform: scale(0.985); }

    .tile.primary.blue { background: linear-gradient(180deg, rgba(21,32,48,0.96), rgba(14,20,29,0.96)); }
    .tile.primary.purple { background: linear-gradient(180deg, rgba(29,22,42,0.96), rgba(18,14,27,0.96)); }
    .tile.primary.neutral, .tile.cozy.neutral { background: linear-gradient(180deg, rgba(20,27,39,0.96), rgba(13,18,27,0.96)); }
    .tile.cozy { min-height: 110px; }
    .tile.cozy:not([data-open]):not([data-summary]) { cursor: default; }

    body.light-theme .tile,
    body.light-theme .summary-card,
    body.light-theme .detail-card,
    body.light-theme .form-card,
    body.light-theme .call-card,
    body.light-theme .customer-card,
    body.light-theme .note-card,
    body.light-theme .search-wrap,
    body.light-theme .customer-mini,
    body.light-theme .detail-hero {
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(244,247,252,0.98));
      border-color: rgba(17,24,39,0.08);
      color: #162033;
      box-shadow: 0 10px 24px rgba(31,41,55,0.08);
    }

    body.light-theme .tile.primary.blue { background: linear-gradient(180deg, rgba(231,240,255,0.98), rgba(220,233,252,0.98)); }
    body.light-theme .tile.primary.purple { background: linear-gradient(180deg, rgba(242,234,255,0.98), rgba(233,225,251,0.98)); }
    body.light-theme .tile.primary.neutral,
    body.light-theme .tile.cozy.neutral { background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(243,247,252,0.98)); }

    .tile-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 18px; }
    .tile-icon { width: 40px; height: 40px; border-radius: 14px; display: grid; place-items: center; border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.05); font-size: 18px; }
    .tile.blue .tile-icon { background: var(--blue-soft); }
    .tile.purple .tile-icon { background: var(--purple-soft); }
    .tile.red .tile-icon { background: var(--red-soft); }
    .tile.green .tile-icon { background: var(--green-soft); }
    .tile.amber .tile-icon { background: var(--amber-soft); }
    .tile-badge { font-size: 12px; color: var(--muted); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); border-radius: 999px; padding: 6px 8px; line-height: 1; }
    .tile-label { font-size: 15px; font-weight: 600; line-height: 1.18; letter-spacing: -0.02em; max-width: 90%; }
    .settings .tile-label { max-width: 72%; margin-bottom: 8px; }
    .tile-number { position: absolute; right: 14px; bottom: 12px; font-size: 32px; font-weight: 700; letter-spacing: -0.04em; color: rgba(236,242,255,0.98); }
    body.light-theme .tile-number { color: #162033; }
    .tile-footnote { position: absolute; left: 14px; right: 14px; bottom: 14px; font-size: 12px; line-height: 1.28; color: var(--muted); }
    .settings .tile-number { display: none; }

    .summary-card,
    .detail-card,
    .form-card {
      margin-top: 16px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(14,20,30,0.86), rgba(11,16,24,0.9));
      padding: 16px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.24);
    }

    .summary-head,
    .results-head,
    .detail-head,
    .form-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .summary-title,
    .results-title,
    .detail-title,
    .form-title { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }

    .summary-sub,
    .results-sub,
    .detail-sub,
    .form-sub,
    .call-company,
    .customer-company,
    .call-meta,
    .customer-meta,
    .detail-key,
    .note-card-meta,
    .customer-mini-sub,
    .tile-footnote,
    .eyebrow,
    .sub-sub {
      color: var(--muted);
      font-size: 12px;
    }

    .now-pill,
    .tile-badge,
    .pill,
    .icon-btn,
    .back-btn,
    .sub-icon-btn,
    .action-btn,
    .detail-action,
    .form-btn,
    .quick-pick,
    .field input,
    .field textarea,
    .field select,
    .nav-item.active {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    body.light-theme .now-pill,
    body.light-theme .tile-badge,
    body.light-theme .pill,
    body.light-theme .icon-btn,
    body.light-theme .back-btn,
    body.light-theme .sub-icon-btn,
    body.light-theme .action-btn,
    body.light-theme .detail-action,
    body.light-theme .form-btn,
    body.light-theme .quick-pick,
    body.light-theme .field input,
    body.light-theme .field textarea,
    body.light-theme .field select,
    body.light-theme .nav-item.active {
      background: rgba(255,255,255,0.88);
      border-color: rgba(17,24,39,0.10);
      color: #162033;
    }

    .now-pill { border-radius: 999px; padding: 8px 10px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }

    .bottom-bar {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 10px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }

    .nav-item { border-radius: 16px; padding: 12px 6px; text-align: center; color: var(--muted); font-size: 0; line-height: 1; background: transparent; border: 1px solid transparent; min-height: 54px; display: grid; place-items: center; cursor: pointer; }
    .nav-item:active { transform: scale(0.96); }
    .nav-item .nav-icon { display: block; font-size: 21px; }
    .nav-item.active { color: var(--text); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05); }
    body.light-theme .nav-item { color: #5b687d; }

    .search-wrap { display: flex; align-items: center; gap: 10px; border-radius: 18px; padding: 12px 14px; margin-bottom: 14px; }
    .search-icon { font-size: 17px; color: var(--muted); }
    .search-input { flex: 1; background: transparent; border: 0; outline: none; color: inherit; font-size: 14px; font-family: inherit; }
    .search-input::placeholder { color: var(--muted); }
    .search-focus { margin-bottom: 6px; }

    .call-list,
    .customer-list,
    .note-list { display: grid; gap: 10px; }

    .call-card,
    .customer-card,
    .note-card { border-radius: 18px; padding: 14px; }

    .customer-card.match {
      border-color: rgba(94,160,255,0.22);
      box-shadow: 0 0 0 1px rgba(94,160,255,0.08) inset, 0 12px 28px rgba(0,0,0,0.18);
      background: linear-gradient(180deg, rgba(21,32,48,0.94), rgba(14,20,29,0.96));
    }

    body.light-theme .customer-card.match { background: linear-gradient(180deg, rgba(234,243,255,0.98), rgba(224,236,252,0.98)); }

    .call-head,
    .call-meta,
    .call-actions,
    .customer-head,
    .customer-meta,
    .customer-actions,
    .detail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .call-head, .customer-head { margin-bottom: 8px; }
    .call-name, .customer-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
    .status-pack { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .pill { padding: 6px 8px; border-radius: 999px; font-size: 11px; line-height: 1; white-space: nowrap; }
    .pill.priority { background: var(--purple-soft); color: #dcc8ff; }
    .pill.overdue { background: var(--red-soft); color: #ffc3cb; }
    .pill.done { background: var(--green-soft); color: #baf1d8; }
    .pill.meeting { background: var(--amber-soft); color: #ffe1a5; }
    .pill.match { background: var(--blue-soft); color: #d6e6ff; }
    .call-meta, .customer-meta { margin-bottom: 10px; }
    .call-note, .customer-note, .note-card-text { font-size: 13px; line-height: 1.35; margin-bottom: 12px; }
    .call-actions, .customer-actions { justify-content: flex-start; }

    .action-btn,
    .detail-action,
    .form-btn {
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      color: inherit;
    }

    .action-btn.primary,
    .detail-action.primary,
    .form-btn.primary {
      background: rgba(94,160,255,0.12);
      border-color: rgba(94,160,255,0.22);
      box-shadow: 0 0 0 1px rgba(94,160,255,0.08) inset;
    }

    .detail-hero {
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 14px;
      background: linear-gradient(180deg, rgba(21,32,48,0.94), rgba(14,20,29,0.96));
      border: 1px solid rgba(94,160,255,0.16);
      box-shadow: 0 0 0 1px rgba(94,160,255,0.06) inset, 0 18px 45px rgba(0,0,0,0.24);
    }

    body.light-theme .detail-hero { background: linear-gradient(180deg, rgba(234,243,255,0.98), rgba(224,236,252,0.98)); }
    .detail-name { font-size: 22px; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 6px; }
    .detail-company { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
    .detail-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .detail-grid { display: grid; gap: 10px; }
    .detail-row { align-items: flex-start; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    body.light-theme .detail-row { border-bottom-color: rgba(17,24,39,0.06); }
    .detail-row:last-child { border-bottom: 0; }
    .detail-key { min-width: 110px; }
    .detail-value { font-size: 13px; text-align: right; max-width: 60%; }
    .detail-link { color: inherit; text-decoration: none; border-bottom: 1px dashed rgba(255,255,255,0.18); }
    body.light-theme .detail-link { border-bottom-color: rgba(17,24,39,0.18); }
    .detail-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; }
    .note-card-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }

    .customer-mini {
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
      background: linear-gradient(180deg, rgba(21,32,48,0.94), rgba(14,20,29,0.96));
      border: 1px solid rgba(94,160,255,0.16);
      box-shadow: 0 0 0 1px rgba(94,160,255,0.06) inset, 0 18px 45px rgba(0,0,0,0.24);
    }

    body.light-theme .customer-mini { background: linear-gradient(180deg, rgba(234,243,255,0.98), rgba(224,236,252,0.98)); }
    .customer-mini-name { font-size: 18px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 4px; }
    .customer-mini-next { font-size: 12px; color: inherit; }

    .quick-picks { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
    .quick-pick { border-radius: 14px; padding: 12px; font-size: 12px; font-weight: 700; color: inherit; cursor: pointer; text-align: center; }
    .quick-pick.selected { background: rgba(94,160,255,0.12); border-color: rgba(94,160,255,0.22); box-shadow: 0 0 0 1px rgba(94,160,255,0.08) inset; }

    .form-stack { display: grid; gap: 12px; }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); }
    .field input, .field textarea, .field select { width: 100%; border-radius: 14px; padding: 12px 14px; font: inherit; outline: none; color: inherit; }
    .field textarea { min-height: 96px; resize: vertical; }
    .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
    .form-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    select option { background: #14202b; color: var(--text); }
    body.light-theme select option { background: #ffffff; color: #162033; }

    @keyframes splashRise { to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes splashFade { 0%, 72% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }

    @media (max-width: 380px) {
      .tile { min-height: 114px; padding: 12px; }
      .tile.cozy { min-height: 100px; }
      .tile-label { font-size: 14px; }
      .tile-number { font-size: 30px; }
      .title, .sub-title { font-size: 20px; }
      .detail-actions, .form-actions, .quick-picks { grid-template-columns: 1fr; }
      .splash-opero-word { font-size: 36px; }
      .splash-product { font-size: 24px; }
      .splash-ring { width: 260px; height: 260px; }
      .splash-line-bottom { margin-top: 104px; }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="Kontakti Mobiili v1">
    <section class="splash" aria-label="Splash">
      <div class="splash-shell">
        <div class="splash-brand">
          <div class="splash-opero-logo">⊘</div>
          <div class="splash-opero-word">OPERO</div>
        </div>
        <div class="splash-line"></div>
        <div class="splash-product">KONTAKTI</div>
        <div class="splash-ring"></div>
        <div class="splash-line splash-line-bottom"></div>
        <div class="splash-loading">Loading...</div>
      </div>
    </section>

    <section class="screen" aria-label="Etusivu">
      <header class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true"><div class="logo-mark">K</div></div>

      document.getElementById('entryDate').value = '';
      noteEntryScreen.querySelectorAll('.quick-pick[data-value]').forEach(btn => btn.classList.toggle('selected', btn.dataset.value === presetAction));
    }

    function openCustomer(id) {
      const customer = customers.find(c => c.id === Number(id));
      if (!customer) return;
      renderCustomerDetail(customer);
      openScreen('customer');
    }

    function openEntry(id, presetAction = '') {
      const customer = customers.find(c => c.id === Number(id)) || currentCustomer;
      if (!customer) return;
      prefillEntry(customer, presetAction);
      openScreen('entry');
    }

    const summaryConfigs = {
      meetings: { title: 'Tapaamiset', icon: '🤝', listTitle: 'Tapaamiset tänään', filter: customer => customer.meeting },
      overdue: { title: 'Erääntyneet', icon: '⏰', listTitle: 'Erääntyneet asiakkaat', filter: customer => customer.overdue },
      notes: { title: 'Uudet merkinnät', icon: '📝', listTitle: 'Asiakkaat uusilla merkinnöillä', filter: customer => customer.notes && customer.notes.length > 0 },
      done: { title: 'Soitettu tänään', icon: '✅', listTitle: 'Soitetut asiakkaat', filter: customer => customer.done }
    };

    function openSummary(key) {
      const config = summaryConfigs[key];
      if (!config) return;
      document.getElementById('summaryTitle').textContent = config.title;
      document.getElementById('summaryIcon').textContent = config.icon;
      document.getElementById('summaryListTitle').textContent = config.listTitle;
      const items = customers.filter(config.filter);
      document.getElementById('summaryCount').textContent = `${items.length} kpl`;
      const list = document.getElementById('summaryList');
      list.innerHTML = '';
      items.forEach(customer => list.appendChild(createCallCard(customer)));
      openScreen('summary');
    }

    function renderStaticLists() {
      document.getElementById('callsList').replaceChildren(...customers.map(createCallCard));

      const priorityCustomers = customers.filter(c => c.priority);
      document.getElementById('priorityCount').textContent = `${priorityCustomers.length} kpl`;
      document.getElementById('priorityList').replaceChildren(...priorityCustomers.map(createCallCard));

      const matched = customers.filter(c => `${c.name} ${c.company}`.toLowerCase().includes('ravintola'));
      const primaryMatch = matched[0] || customers[0];
      const remainingCustomers = customers.filter(c => c.id !== primaryMatch.id).slice(0, 3);
      const searchFocus = document.getElementById('searchFocus');
      const customerList = document.getElementById('customerList');
      searchFocus.innerHTML = '';
      customerList.innerHTML = '';
      searchFocus.appendChild(createCustomerCard(primaryMatch, { highlight: true, includeMatch: true }));
      remainingCustomers.forEach(c => customerList.appendChild(createCustomerCard(c)));
      renderCustomerDetail(primaryMatch);
      prefillEntry(primaryMatch);
    }

    document.querySelectorAll('[data-open]').forEach(el => {
      el.addEventListener('click', () => openScreen(el.dataset.open));
    });

    document.querySelectorAll('[data-summary]').forEach(el => {
      el.addEventListener('click', () => openSummary(el.dataset.summary));
    });

    function openGoogleSearch(query) {
      const url = 'https://www.google.com/search?q=' + encodeURIComponent(query);
      window.open(url, '_blank', 'noopener');
    }

    function openYtj() {
      window.open('https://tietopalvelu.ytj.fi/', '_blank', 'noopener');
    }

    phone.addEventListener('click', (e) => {
      const openCustomerBtn = e.target.closest('[data-open-customer]');
      if (openCustomerBtn) {
        openCustomer(openCustomerBtn.getAttribute('data-open-customer'));
        return;
      }

      const openEntryBtn = e.target.closest('[data-open-entry]');
      if (openEntryBtn) {
        openEntry(openEntryBtn.getAttribute('data-open-entry'));
        return;
      }

      const backBtn = e.target.closest('[data-back]');
      if (backBtn) {
        openScreen(backBtn.dataset.back);
        return;
      }

      if (e.target.id === 'globalSearchBtn') {
        openGoogleSearch('yrityshaku Suomi');
        return;
      }

      if (e.target.id === 'callsSearchBtn') {
        openGoogleSearch('yrityshaku soitot tänään');
        return;
      }

      if (e.target.id === 'customersSearchBtn') {
        const searchValue = customersScreen.querySelector('.search-input')?.value?.trim();
        openGoogleSearch(searchValue || 'yrityshaku Suomi');
        return;
      }

      if (e.target.id === 'detailYtjBtn' || e.target.id === 'detailYtjActionBtn') {
        openYtj();
        return;
      }

      const callBtn = e.target.closest('[data-call]');
      if (callBtn) {
        const customer = customers.find(c => c.id === Number(callBtn.getAttribute('data-call'))) || currentCustomer;
        callCustomer(customer);
        return;
      }

      if (e.target.id === 'openNoteEntry') {
        openEntry(currentCustomer.id);
        return;
      }

      if (e.target.id === 'detailCallBtn') {
        callCustomer(currentCustomer);
        return;
      }

      const quickPick = e.target.closest('.quick-pick[data-value]');
      if (quickPick) {
        noteEntryScreen.querySelectorAll('.quick-pick[data-value]').forEach(btn => btn.classList.remove('selected'));
        quickPick.classList.add('selected');
        document.getElementById('entryAction').value = quickPick.dataset.value;
        return;
      }

      const themeBtn = e.target.closest('[data-setting-theme]');
      if (themeBtn) {
        const theme = themeBtn.dataset.settingTheme;
        document.body.classList.toggle('light-theme', theme === 'light');
        settingsScreen.querySelectorAll('[data-setting-theme]').forEach(btn => btn.classList.toggle('selected', btn.dataset.settingTheme === theme));
      }
    });

    document.addEventListener('change', (e) => {
      if (e.target.id === 'entryNext') {
        document.getElementById('entryNextCustomWrap').classList.toggle('hidden', e.target.value !== 'Muu');
      }
    });

    document.getElementById('saveEntryBtn').addEventListener('click', () => {
      const action = document.getElementById('entryAction').value.trim() || 'Merkintä';
      const note = document.getElementById('entryNote').value.trim() || 'Ei lisättyä muistiinpanoa.';
      const nextSelectValue = document.getElementById('entryNext').value;
      const nextCustomValue = document.getElementById('entryNextCustom').value.trim();
      const next = (nextSelectValue === 'Muu' ? nextCustomValue : nextSelectValue) || currentCustomer.next;
      const date = document.getElementById('entryDate').value;

      currentCustomer.next = next;
      currentCustomer.last = 'Tänään';
      currentCustomer.done = action.toLowerCase().includes('soit') || action.toLowerCase().includes('tavat');
      currentCustomer.notes.unshift({
        title: 'Uusi merkintä',
        meta: `Tänään · ${action}${date ? ` · ${date}` : ''}`,
        text: note
      });

      renderStaticLists();
      openScreen('customer');
    });

    renderStaticLists();
  </script>
</body>
</html>
