<!doctype html><html lang="fi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07111f"><title>Kontakti Mobiili v2 test</title><style>
:root{--bg:#040a15;--p:#07111f;--c:#0d1b2f;--l:rgba(145,180,255,.16);--t:#eef4ff;--m:#9db0d3;--b:#4e9eff;--r:#ff5f7a;--g:#35d48d;--pu:#9f6bff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,rgba(78,158,255,.14),transparent 34%),var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;justify-content:center}.phone{width:100%;max-width:430px;min-height:100dvh;background:var(--p);padding:18px 14px 28px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.brand{display:flex;gap:10px;align-items:center}.logo{width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,#1d74ff,#092fb4);display:grid;place-items:center;font-weight:900}h1{font-size:22px;margin:0;letter-spacing:-.04em}.muted{color:var(--m);font-size:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}button,.btn{border:1px solid var(--l);background:rgba(255,255,255,.045);color:var(--t);border-radius:16px;padding:11px;font:inherit;font-weight:800;text-decoration:none;text-align:center}.tile{min-height:106px;text-align:left;display:flex;flex-direction:column;justify-content:space-between}.blue{background:linear-gradient(160deg,rgba(78,158,255,.28),rgba(255,255,255,.04))}.green{background:linear-gradient(160deg,rgba(53,212,141,.23),rgba(255,255,255,.04))}.purple{background:linear-gradient(160deg,rgba(159,107,255,.26),rgba(255,255,255,.04))}.num{font-size:34px;font-weight:900}.screen{display:none}.screen.on{display:block}.card{border:1px solid var(--l);background:rgba(13,27,47,.92);border-radius:22px;padding:13px;margin:10px 0}.row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.name{font-weight:900;letter-spacing:-.03em}.small{font-size:12px;color:var(--m);line-height:1.35}.badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}.badge{font-size:10px;font-weight:900;border-radius:99px;padding:5px 7px;background:rgba(78,158,255,.15);border:1px solid var(--l)}.prio{background:rgba(159,107,255,.2)}.del{background:rgba(255,95,122,.18)}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}.actions button,.actions a{font-size:12px;padding:9px 6px}.field{margin:10px 0}label{display:block;color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.12em;margin:0 0 5px;font-weight:900}input,textarea,select{width:100%;border:1px solid var(--l);background:rgba(255,255,255,.05);color:var(--t);border-radius:14px;padding:12px;font:inherit}textarea{min-height:82px}.bar{display:flex;gap:8px;margin-bottom:12px}.bar button{width:42px;padding:0}.bar h2{flex:1;margin:0;font-size:20px}.search{margin:10px 0}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#0b1628;border:1px solid rgba(78,158,255,.35);padding:10px 14px;border-radius:99px;display:none}.toast.on{display:block}.empty{border:1px dashed var(--l);border-radius:18px;padding:18px;color:var(--m);text-align:center}@media(max-width:370px){.actions{grid-template-columns:1fr 1fr}}
</style></head><body><main class="phone"><section id="home" class="screen on"><div class="top"><div class="brand"><div class="logo">K</div><div><div class="muted">Opero · Kontakti</div><h1>Mobiili v2</h1></div></div><button onclick="show('settings')">⚙️</button></div><div class="grid"><button class="tile blue" onclick="show('calls')"><span>📞 Soitot</span><span class="num" id="nCalls">0</span></button><button class="tile" onclick="show('customers')"><span>👥 Asiakkaat</span><span class="num" id="nCust">0</span></button><button class="tile purple" onclick="show('priority')"><span>🟣 Priority</span><span class="num" id="nPrio">0</span></button><button class="tile green" onclick="show('add')"><span>＋ Uusi asiakas</span><span class="num">+</span></button></div><div class="card"><b>Nopea näkymä</b><div class="small">Priority + erääntyneet ensin. Testidata on GitHubissa ilman puhelimia/sähköposteja.</div><div id="homeList"></div></div></section>
<section id="calls" class="screen"><div class="bar"><button onclick="show('home')">←</button><h2>Soitot tänään</h2><button onclick="show('add')">＋</button></div><div id="callsList"></div></section>

<section id="detail" class="screen"><div class="bar"><button onclick="show('customers')">←</button><h2>Asiakaskortti</h2><button onclick="removeCurrent()">🗑️</button></div><div id="detailBox"></div></section>
<section id="entry" class="screen"><div class="bar"><button onclick="show('detail')">←</button><h2>Merkintä</h2></div><div class="card"><div class="field"><label>Toimenpide</label><select id="eType"><option>Soitto</option><option>Ei vastannut</option><option>Tapaaminen</option><option>Seuranta</option><option>Sähköposti</option></select></div><div class="field"><label>Muistiinpano</label><textarea id="eNote"></textarea></div><div class="field"><label>Seuraava päivä</label><input id="eNext" type="date"></div><div class="field"><label>Priority</label><select id="ePrio"><option value="0">Ei</option><option value="1">Kyllä</option></select></div><button class="blue" onclick="saveEntry()">Tallenna merkintä</button></div></section>
<section id="add" class="screen"><div class="bar"><button onclick="show('home')">←</button><h2>Uusi asiakas</h2></div><div class="card"><div class="field"><label>Y-tunnus</label><input id="aBid" placeholder="1234567-8"></div><div class="field"><label>Nimi *</label><input id="aName" placeholder="Yritys / paikka"></div><div class="field"><label>Osoite</label><input id="aAdr" placeholder="Katuosoite, postinumero, kaupunki"></div><div class="field"><label>Kaupunki</label><input id="aCity" placeholder="Kuopio"></div><div class="field"><label>Puhelin</label><input id="aPhone" placeholder="040..."></div><div class="field"><label>Muistiinpano</label><textarea id="aNote" placeholder="Miksi lisättiin?"></textarea></div><div class="field"><label>Priority</label><select id="aPrio"><option value="0">Ei</option><option value="1">Kyllä</option></select></div><button class="green" onclick="addCustomer()">Tallenna uusi asiakas</button></div></section>
<section id="archive" class="screen"><div class="bar"><button onclick="show('settings')">←</button><h2>Arkisto</h2></div><div id="archList"></div></section>
<section id="settings" class="screen"><div class="bar"><button onclick="show('home')">←</button><h2>Asetukset</h2></div><div class="card"><button onclick="show('archive')">Näytä arkisto / palautus</button><br><br><button onclick="resetData()">Palauta testidata</button><br><br><button onclick="copyJson()">Kopioi JSON</button></div></section><div id="toast" class="toast"></div></main><script>
const SEED=[{"id":"cust_1","customer_id":"KONTAKTI-0001","name":"Ravintola Ottopoika","city":"Kuopio","business_id":"","address":"Kauppakatu 40-42, 70110 Kuopio","phone":"","next_date":"2026-04-20","next_action":"Tapaaminen","priority":false,"notes":[{"date":"2026-04-17","type":"Tapaaminen","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_4","customer_id":"KONTAKTI-0004","name":"Bar Pörrin Pesä","city":"Kuopio","business_id":"2836710-3","address":"Kalevalankatu 29, 70500 Kuopio","phone":"","next_date":"2026-04-21","next_action":"Soitto","priority":false,"notes":[{"date":"2026-04-17","type":"Soitto","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_5","customer_id":"KONTAKTI-0005","name":"Sfizieria Sorrento","city":"Kuopio","business_id":"2274928-2","address":"Kauppakatu 63, 70110 Kuopio","phone":"","next_date":"2026-04-22","next_action":"Soitto","priority":false,"notes":[{"date":"2026-04-17","type":"Soitto","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_7","customer_id":"KONTAKTI-0007","name":"Ampiaisen Pesä Oy Ravintola Ampiainen","city":"Kuopio","business_id":"1611505-6","address":"Lönnrotinkatu 32, 70500 Kuopio","phone":"","next_date":"2026-04-22","next_action":"Soitto","priority":false,"notes":[{"date":"2026-04-17","type":"Soitto","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_8","customer_id":"KONTAKTI-0008","name":"Ravintola Rio Grande","city":"Kuopio","business_id":"","address":"Särkiniementie 4, 70700 Kuopio","phone":"","next_date":"2026-04-20","next_action":"Soitto","priority":false,"notes":[{"date":"2026-04-17","type":"Soitto","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_9","customer_id":"KONTAKTI-0009","name":"Momento Matkus","city":"Kuopio","business_id":"0920150-3","address":"Matkus Shopping Center Matkuksentie 60, 1. krs 70800 Kuopio","phone":"","next_date":"2026-04-20","next_action":"Tapaaminen","priority":false,"notes":[{"date":"2026-04-17","type":"Tapaaminen","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_12","customer_id":"KONTAKTI-0012","name":"Ravintola Dominari","city":"Kuopio","business_id":"","address":"Pitkäsiima 27, 70820 Kuopio","phone":"","next_date":"2026-04-28","next_action":"Tapaaminen","priority":false,"notes":[{"date":"2026-04-26","type":"Tapaaminen","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_19","customer_id":"KONTAKTI-0019","name":"Liikuntakeskus Huippu Center","city":"Kuopio","business_id":"","address":"Siikaranta 9 A, 70620 Kuopio","phone":"","next_date":"2026-04-22","next_action":"Tapaaminen","priority":false,"notes":[{"date":"2026-04-01","type":"Tapaaminen","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_38","customer_id":"KONTAKTI-0038","name":"Bar Lähtöruutu, Hupijuttu Oy","city":"Kuopio","business_id":"3119546-1","address":"Vuorikatu 26, 70100 Kuopio","phone":"","next_date":"2026-05-01","next_action":"Soitto","priority":false,"notes":[{"date":"2026-04-26","type":"Soitto","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_52","customer_id":"KONTAKTI-0052","name":"Bon Kuopio Oy","city":"Kuopio","business_id":"3313046-9","address":"","phone":"","next_date":"2026-04-21","next_action":"Soitto","priority":false,"notes":[{"date":"2026-04-07","type":"Soitto","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_67","customer_id":"KONTAKTI-0067","name":"Ravintola Sataman Helmi","city":"Kuopio","business_id":"1488130-4","address":"Kauppakatu 2, 70100 Kuopio","phone":"","next_date":"2026-04-22","next_action":"Soitto","priority":false,"notes":[{"date":"2026-04-17","type":"Soitto","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_73","customer_id":"KONTAKTI-0073","name":"Helemijä sijoille Oy","city":"Iisalmi","business_id":"2450176-6","address":"Ylemmäisentie 6, 74150 Iisalmi","phone":"","next_date":"2026-04-22","next_action":"Seuranta","priority":false,"notes":[{"date":"2026-04-17","type":"Seuranta","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_113","customer_id":"KONTAKTI-0113","name":"Virran Hulivili Oy","city":"Iisalmi","business_id":"3519876-6","address":"Eteläinen Pohjolankatu 1, 74100 Iisalmi","phone":"","next_date":"2026-04-23","next_action":"Tapaaminen","priority":false,"notes":[{"date":"2026-04-16","type":"Tapaaminen","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null},{"id":"cust_114","customer_id":"KONTAKTI-0114","name":"Hotel Golden Dome / Toripaviljonki","city":"Iisalmi","business_id":"2758410-6","address":"Kirkkopuistonkatu 28, Iisalmi","phone":"","next_date":"2026-04-22","next_action":"Tapaaminen","priority":false,"notes":[{"date":"2026-04-01","type":"Tapaaminen","text":"Tuotu testiaineistosta mobiiliviikon kokeiluun."}],"incomplete":false,"created_source":"csv_test_sanitized","deleted_at":null}];
const KEY='kontakti_mobile_v2_sanitized_20260426';
let data=JSON.parse(localStorage.getItem(KEY)||'null')||SEED.map(x=>({...x,call_status:null}));let cur=data[0]?.id;let today=new Date().toISOString().slice(0,10);
function save(){localStorage.setItem(KEY,JSON.stringify(data))}function act(){return data.filter(x=>!x.deleted_at)}function del(){return data.filter(x=>x.deleted_at)}function by(id){return data.find(x=>x.id===id)}function due(x){return x.priority||!x.next_date||x.next_date<=today}function sort(a){return [...a].sort((x,y)=>(y.priority?1:0)-(x.priority?1:0)||(x.next_date||'9999').localeCompare(y.next_date||'9999')||x.name.localeCompare(y.name))}function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function toast(t){let el=document.getElementById('toast');el.textContent=t;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),2200)}function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');render();scrollTo(0,0)}function badges(c){return `${c.priority?'<span class="badge prio">Priority</span>':''}${c.incomplete?'<span class="badge">Täydennä</span>':''}${c.deleted_at?'<span class="badge del">Arkisto</span>':''}${c.next_date&&c.next_date<today?'<span class="badge del">Erääntynyt</span>':''}`}function card(c){return `<div class="card"><div class="row"><div><div class="name">${esc(c.name)}</div><div class="small">${esc(c.city||'')} ${c.business_id?'· '+esc(c.business_id):''}</div></div><div class="badges">${badges(c)}</div></div><div class="small">Seuraava: <b>${esc(c.next_date||'ei päivää')}</b> · ${esc(c.next_action||'Soitto')}</div><div class="small">${esc(c.address||'Ei osoitetta')}</div><div class="actions">${c.phone?`<a class="btn blue" href="tel:${c.phone.replace(/[^0-9+]/g,'')}">📞</a>`:'<button disabled>📞</button>'}<button onclick="openDetail('${c.id}')">Avaa</button><button onclick="openEntry('${c.id}')">Merkintä</button>${c.deleted_at?`<button onclick="restore('${c.id}')">Palauta</button>`:`<button onclick="softDelete('${c.id}')">Poista</button>`}</div></div>`}function render(){let a=act(),d=sort(a.filter(due));nCalls.textContent=d.length;nCust.textContent=a.length;nPrio.textContent=a.filter(x=>x.priority).length;homeList.innerHTML=d.slice(0,4).map(card).join('')||'<div class="empty">Ei soittoja.</div>';callsList.innerHTML=d.map(card).join('')||'<div class="empty">Ei soittoja.</div>';renderCustomers();prioList.innerHTML=sort(a.filter(x=>x.priority)).map(card).join('')||'<div class="empty">Ei priorityjä.</div>';archList.innerHTML=del().map(card).join('')||'<div class="empty">Arkisto tyhjä.</div>';if(document.getElementById('detail').classList.contains('on'))renderDetail()}function renderCustomers(){let q=(document.getElementById('q')?.value||'').toLowerCase();let l=sort(act().filter(c=>[c.name,c.city,c.business_id,c.address].join(' ').toLowerCase().includes(q)));custList.innerHTML=l.map(card).join('')||'<div class="empty">Ei osumia.</div>'}function openDetail(id){cur=id;show('detail')}function renderDetail(){let c=by(cur);if(!c)return;detailBox.innerHTML=`<div class="card"><h2>${esc(c.name)}</h2><div class="small">${esc(c.customer_id||'')} · ${esc(c.city||'')}</div><p>${badges(c)}</p><p><b>Y-tunnus:</b> ${esc(c.business_id||'—')}</p><p><b>Osoite:</b> ${esc(c.address||'—')}</p><p><b>Puhelin:</b> ${esc(c.phone||'—')}</p><p><b>Seuraava:</b> ${esc(c.next_date||'ei päivää')} · ${esc(c.next_action||'')}</p><div class="actions"><button onclick="openEntry('${c.id}')">Merkintä</button><button onclick="softDelete('${c.id}')">Poista</button></div></div><div class="card"><b>Merkinnät</b>${(c.notes||[]).map(n=>`<div class="card"><div class="small">${esc(n.date)} · ${esc(n.type)}</div>${esc(n.text)}</div>`).join('')||'<div class="empty">Ei merkintöjä.</div>'}</div>`}function openEntry(id){cur=id;eNote.value='';eNext.value='';ePrio.value=by(id)?.priority?'1':'0';show('entry')}function saveEntry(){let c=by(cur);c.notes=[{date:today,type:eType.value,text:eNote.value||eType.value},...(c.notes||[])];c.next_action=eType.value;if(eNext.value)c.next_date=eNext.value;c.priority=ePrio.value==='1';c.call_status=eType.value==='Ei vastannut'?'noanswer':'done';save();toast('Merkintä tallennettu');show('detail')}function addCustomer(){if(!aName.value.trim())return toast('Nimi puuttuu');let t=Date.now(),c={id:'mob_'+t,customer_id:'MOB-'+t,name:aName.value.trim(),business_id:aBid.value.trim(),address:aAdr.value.trim(),city:aCity.value.trim(),phone:aPhone.value.trim(),next_date:'',next_action:'Uusi asiakas',priority:aPrio.value==='1',incomplete:true,created_source:'mobile',deleted_at:null,notes:[{date:today,type:'Uusi asiakas',text:aNote.value||'Lisätty mobiilissa, täydennä desktopissa.'}]};data.unshift(c);save();cur=c.id;['aBid','aName','aAdr','aCity','aPhone','aNote'].forEach(id=>document.getElementById(id).value='');toast('Uusi asiakas tallennettu');show('detail')}function softDelete(id){let c=by(id);c.deleted_at=new Date().toISOString();c.deleted_by='mobile_user';c.delete_source='mobile';save();toast('Asiakas arkistoitu');show('home')}function removeCurrent(){softDelete(cur)}function restore(id){let c=by(id);c.deleted_at=null;save();toast('Palautettu');render()}function resetData(){if(confirm('Palautetaanko testidata?')){localStorage.removeItem(KEY);data=SEED.map(x=>({...x,call_status:null}));save();show('home')}}async function copyJson(){try{await navigator.clipboard.writeText(JSON.stringify(data,null,2));toast('JSON kopioitu')}catch(e){toast('Kopiointi ei onnistunut')}}render();
</script></body></html>
